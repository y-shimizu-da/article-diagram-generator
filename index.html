<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事広告 作図生成ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
    .subtitle { color: #666; margin-top: 6px; font-size: 0.95rem; }

    .api-key-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 16px 24px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-key-bar label { font-size: 0.85rem; font-weight: 600; color: #555; white-space: nowrap; }
    .api-key-bar input {
      flex: 1; min-width: 200px; padding: 8px 12px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; font-family: monospace;
    }
    .api-key-bar input:focus { outline: none; border-color: #4361ee; }
    .api-key-bar .status { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
    .api-key-bar .status.saved { background: #e8f5e9; color: #2e7d32; }
    .api-key-bar .status.empty { background: #fff3e0; color: #e65100; }
    .api-key-bar .btn-save-key {
      padding: 8px 16px; background: #4361ee; color: #fff; border: none;
      border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .api-key-bar .btn-save-key:hover { background: #3651d4; }

    .step {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px; overflow: hidden; display: none;
    }
    .step.active { display: block; }
    .step-header {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 24px; border-bottom: 1px solid #eee;
    }
    .step-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: #4361ee; color: #fff;
      border-radius: 50%; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
    }
    .step-header h2 { font-size: 1.15rem; font-weight: 600; }
    .step-content { padding: 24px; }

    .upload-area {
      border: 2.5px dashed #ccc; border-radius: 14px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #4361ee; background: #f8f9ff; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-area p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 20px 0; color: #aaa; font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ddd; }
    textarea {
      width: 100%; min-height: 200px; padding: 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; line-height: 1.7; resize: vertical; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #4361ee; }

    .btn {
      display: inline-block; padding: 12px 28px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 16px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #4361ee; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #3651d4; }
    .btn.secondary { background: #e9ecef; color: #495057; }
    .btn.secondary:hover:not(:disabled) { background: #dee2e6; }

    .section-card {
      border: 1px solid #eee; border-radius: 10px;
      margin-bottom: 4px; overflow: hidden; transition: all 0.2s;
    }
    .section-card.selected { border-color: #4361ee; box-shadow: 0 0 0 1px #4361ee; }
    .section-card-header {
      display: flex; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.2s;
    }
    .section-card-header:hover { background: #fafbff; }
    .section-card-header input[type="checkbox"] {
      margin-top: 3px; flex-shrink: 0; width: 18px; height: 18px; accent-color: #4361ee;
    }
    .section-info { flex: 1; min-width: 0; }
    .section-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .section-title { font-weight: 600; font-size: 0.95rem; }
    .section-index {
      font-size: 0.7rem; background: #e9ecef; color: #666; padding: 1px 6px;
      border-radius: 4px; flex-shrink: 0;
    }
    .section-preview {
      color: #777; font-size: 0.82rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .section-actions {
      display: flex; gap: 4px; padding: 0 16px 10px; flex-wrap: wrap;
    }
    .section-actions button {
      font-size: 0.72rem; padding: 4px 10px; border: 1px solid #ddd;
      background: #fff; border-radius: 5px; cursor: pointer; transition: all 0.15s;
      color: #555; white-space: nowrap;
    }
    .section-actions button:hover { background: #f0f3ff; border-color: #4361ee; color: #4361ee; }

    .merge-connector { text-align: center; padding: 2px 0; }
    .merge-connector button {
      font-size: 0.72rem; padding: 3px 12px; border: 1px dashed #f59e0b;
      background: #fffbeb; border-radius: 12px; cursor: pointer; color: #b45309;
    }
    .merge-connector button:hover { background: #fef3c7; border-style: solid; }

    .section-type-picker { display: none; padding: 0 16px 16px; border-top: 1px solid #f0f0f0; }
    .section-card.selected .section-type-picker { display: block; }
    .section-type-picker h4 {
      font-size: 0.75rem; font-weight: 600; color: #888; margin: 12px 0 8px; letter-spacing: 0.5px;
    }
    .type-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 6px;
    }
    .type-grid label { display: block; }
    .type-grid input { display: none; }
    .type-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 9px; border: 1.5px solid #eee; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; font-size: 0.78rem;
    }
    .type-chip:hover { border-color: #b0c4ff; background: #f8f9ff; }
    .type-grid input:checked + .type-chip { border-color: #4361ee; background: #eef1ff; font-weight: 600; }
    .type-chip-icon { font-size: 1rem; flex-shrink: 0; }
    .type-chip-label { line-height: 1.3; }
    .type-chip-name { display: block; font-size: 0.78rem; }
    .type-chip-desc { display: block; font-size: 0.62rem; color: #999; font-weight: 400; }
    .type-category { margin-bottom: 8px; }

    /* Diagram Output */
    .diagram-card {
      border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }
    .diagram-card-header {
      padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .diagram-card-header h3 { font-size: 1rem; font-weight: 600; }
    .diagram-card-body { padding: 24px; display: flex; justify-content: center; overflow-x: auto; }
    .diagram-card-body img {
      max-width: 100%; height: auto; border-radius: 8px;
    }
    .diagram-summary {
      padding: 12px 18px; background: #f0f3ff; border-top: 1px solid #e8ecff;
      font-size: 0.88rem; color: #444; line-height: 1.6;
    }
    .diagram-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm {
      padding: 6px 14px; font-size: 0.8rem; border: 1px solid #ddd;
      background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { background: #f0f3ff; border-color: #4361ee; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }

    /* Reference image picker */
    .ref-picker { margin-top: 10px; }
    .ref-picker h4 { font-size: 0.75rem; font-weight: 600; color: #e8788a; margin-bottom: 6px; }
    .ref-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .ref-thumb {
      width: 100px; height: 66px; border: 2px solid #eee; border-radius: 6px;
      overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative;
    }
    .ref-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ref-thumb:hover { border-color: #4361ee; }
    .ref-thumb.selected { border-color: #e8788a; box-shadow: 0 0 0 2px #e8788a; }
    .ref-thumb .ref-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 0.55rem; background: rgba(0,0,0,0.6); color: #fff;
      padding: 1px 4px; text-align: center; white-space: nowrap; overflow: hidden;
    }
    .ref-none {
      font-size: 0.72rem; color: #aaa; padding: 8px;
      border: 1px dashed #ddd; border-radius: 6px; text-align: center;
    }
    .ref-none a { color: #4361ee; }

    .loading {
      position: fixed; inset: 0; background: rgba(255,255,255,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .loading.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid #e9ecef; border-top-color: #4361ee;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingText { font-size: 0.95rem; color: #555; }
    .error-msg {
      background: #fff0f0; color: #c33; padding: 12px 16px;
      border-radius: 8px; margin-top: 12px; font-size: 0.9rem;
    }
    .hint-text { font-size: 0.82rem; color: #888; margin-bottom: 16px; line-height: 1.6; }

    @media (max-width: 600px) {
      .container { padding: 12px 8px 40px; }
      header h1 { font-size: 1.4rem; }
      .type-grid { grid-template-columns: repeat(2, 1fr); }
      .api-key-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>記事広告 作図生成ツール</h1>
      <p class="subtitle">記事原稿から理解促進用の高品質画像を自動生成します</p>
    </header>

    <div class="api-key-bar">
      <label>Gemini API Key:</label>
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
      <button class="btn-save-key" id="saveKeyBtn">保存</button>
      <span class="status" id="keyStatus"></span>
    </div>

    <!-- Step 1 -->
    <section id="step1" class="step active">
      <div class="step-header">
        <span class="step-number">1</span>
        <h2>記事原稿をアップロード</h2>
      </div>
      <div class="step-content">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📄</div>
          <p>テキストファイルをドラッグ&ドロップ<br>またはクリックして選択</p>
          <input type="file" id="fileInput" accept=".txt,.md,.text" hidden>
        </div>
        <div class="divider"><span>または</span></div>
        <textarea id="articleText" placeholder="記事原稿をここに貼り付けてください..."></textarea>
        <button id="splitBtn" class="btn primary" disabled>文脈を分析する</button>
      </div>
    </section>

    <!-- Step 2 -->
    <section id="step2" class="step">
      <div class="step-header">
        <span class="step-number">2</span>
        <h2>文脈を編集し、作図タイプを指定</h2>
      </div>
      <div class="step-content">
        <p class="hint-text">
          チェックで作図対象を選択。各セクションごとに画像の種類を指定できます。<br>
          「結合」で隣のセクションと統合、「分割」でセクションをさらに細かく分けられます。
        </p>
        <div id="sectionsList"></div>
        <button id="generateBtn" class="btn primary" disabled>選択した文脈の画像を生成</button>
      </div>
    </section>

    <!-- Step 3 -->
    <section id="step3" class="step">
      <div class="step-header">
        <span class="step-number">3</span>
        <h2>生成された画像</h2>
      </div>
      <div class="step-content">
        <div id="diagramsOutput"></div>
        <div class="actions">
          <button id="backBtn" class="btn secondary">文脈選択に戻る</button>
          <button id="downloadAllBtn" class="btn primary">すべてダウンロード</button>
        </div>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loadingText">分析中...</p>
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ============================================================
  // Image type definitions for article LP
  // ============================================================
  const IMAGE_TYPES = {
    // ===== 悩み・共感 =====
    pain_photo: { icon: "😰", name: "悩み訴求（写真風）", desc: "暗めの背景+悩みテキスト散りばめ", category: "悩み・共感",
      prompt: "Japanese cosmetics article LP image. Dark moody background with a close-up of a woman's face (lower half, showing skin texture). Large bold white Japanese headline text at the top expressing frustration/stress. Multiple scattered label tags in blue-gray brush-stroke style around the face, each containing a short Japanese complaint phrase. The overall mood is 'overwhelmed and stressed'. Color palette: dark gray background, white bold headlines, muted steel-blue accent labels. Photorealistic woman's skin, editorial advertising quality." },
    pain_deny: { icon: "✕", name: "否定訴求（×マーク）", desc: "不要なものに×印+太字テキスト", category: "悩み・共感",
      prompt: "Japanese cosmetics article LP image. Top-down flat-lay photo of multiple cosmetic products (brush, foundation tube, powder compact, concealer) arranged on a light marble/cream background. Each product has a large RED X mark overlaid on it. In the center, very large bold Japanese text reads '必要なし！' (Not needed!). The message is 'you can throw all these away'. Bright, clean photography style with bold graphic overlays. Red X marks are hand-drawn style." },

    // ===== 商品訴求 =====
    product_features: { icon: "🎯", name: "機能まとめ（アイコン）", desc: "商品中央+周囲に機能アイコン", category: "商品訴求",
      prompt: "Japanese cosmetics article LP image. Centered product shot on a soft pink-to-cream gradient background. Large bold Japanese headline at top (e.g. revolutionary product claim). Below the headline, a catchy sub-headline in coral/pink handwriting-style font. Around the product, 4-6 small circular icons each containing a simple line-art illustration of a cosmetic item (sunscreen, primer, foundation, concealer, powder) with Japanese labels underneath. The layout communicates 'all-in-one'. Elegant, premium feel with warm pink/beige/gold color palette." },
    product_scene: { icon: "💄", name: "使用シーン", desc: "商品の使用写真+効果テキスト", category: "商品訴求",
      prompt: "Japanese cosmetics article LP image. Close-up photo of a woman applying a cosmetic product to her cheek/face. Soft, flattering lighting on clear beautiful skin. Large bold Japanese text overlaid at the bottom as a headline describing the key benefit. Clean, editorial beauty photography style. Warm skin tones, soft focus background. The image conveys premium quality and effortless beauty. Text has a subtle shadow for readability over the photo." },
    easy_use: { icon: "🧴", name: "簡単さアピール", desc: "簡単な動作の写真+太字メリット", category: "商品訴求",
      prompt: "Japanese cosmetics article LP image. Photo of a woman performing a simple beauty action (like washing face with foam, applying product). She wears a headband, casual/comfortable setting with warm natural lighting. Large bold Japanese headline overlaid on the image emphasizing ease/simplicity (e.g. 'Just wash with soap — done!'). Key benefit word in extra-large coral/pink colored decorative font. White background area on one side for text. Warm, approachable, lifestyle photography feel." },

    // ===== 比較・証明 =====
    before_after: { icon: "🔄", name: "ビフォーアフター（イラスト）", desc: "左右分割のイラスト比較", category: "比較・証明",
      prompt: "Japanese cosmetics article LP image. Split-screen illustration, LEFT side has dark gray background showing a worried/tired woman looking in a mirror with a plain clock above (representing just doing makeup), RIGHT side has warm pink background showing the same woman looking happy/confident in a mirror with a decorated clock and sparkles (representing makeup + skincare combined). Cute Japanese manga/illustration style with soft lines. Japanese text labels above each side. A product illustration appears on the right side. The contrast between gray(before) and pink(after) should be dramatic." },
    price_compare: { icon: "💰", name: "価格比較（左右対比）", desc: "従来コスト vs 本商品の価格比較", category: "比較・証明",
      prompt: "Japanese cosmetics article LP image. Clean split-screen design: LEFT side (light blue background) shows a vertical list of individual cosmetic products with their prices in Japanese yen, stacked top to bottom (sunscreen ¥1,760, primer ¥2,870, foundation ¥2,290, etc.), with a large total at the bottom (e.g. ¥10,000). RIGHT side (soft pink background) shows a single product image with a much lower price in large bold font (e.g. ¥4,864). Headers in decorative frames at the top of each column. The visual clearly shows the cost savings. Clean, infographic style with product illustrations." },
    expert_endorse: { icon: "👩‍⚕️", name: "専門家推薦", desc: "プロの推薦コメント+写真", category: "比較・証明",
      prompt: "Japanese cosmetics article LP image. Professional endorsement layout. Top area has large bold Japanese headline text with key phrase in gold/decorative font (like '大絶賛!' meaning 'highly praised!'). Below shows a professional woman (makeup artist/dermatologist) in an elegant setting. At the bottom, a quoted testimonial in Japanese enclosed in elegant quotation marks with a light background. Soft pink accent color on borders/corners. Premium, trustworthy editorial feel. The layout builds authority and credibility." },

    // ===== ポイント・手順 =====
    points_list: { icon: "📋", name: "ポイントまとめ", desc: "番号付きポイント一覧リスト", category: "ポイント・手順",
      prompt: "Japanese cosmetics article LP image. Vertical numbered points list on a warm beige/cream gradient background. Bold decorative Japanese headline at the top with a small product image beside it. Below, 4-6 horizontal rows, each with: a 'Point' label with number (1,2,3...) in a coral/pink oval badge on the left, and a bold Japanese benefit statement on the right with the KEY WORD in extra-large/bold font. Each row separated by thin lines. Clean, organized, easy to scan. Color palette: warm beige background, coral/brown accent, dark brown text. Product image in top-left corner." },
    step_flow: { icon: "👣", name: "手順フロー（イラスト）", desc: "ステップ図解+かわいいイラスト", category: "ポイント・手順",
      prompt: "Japanese cosmetics article LP image. Horizontal 3-step process flow illustration on a clean white/light background. Each step shows: a warm orange circle containing a cute simple illustration of a person performing an action, with Japanese text description below. Steps are connected by triangular arrow indicators (▶) between them. Illustration style is friendly, simple line-art with warm colors (orange circles, soft skin tones). Each step has a clear Japanese label above. The overall feel is 'this process is easy and friendly'. Warm orange/beige color palette." },
    payment_flow: { icon: "💳", name: "支払い方法説明", desc: "支払い手順のイラストフロー", category: "ポイント・手順",
      prompt: "Japanese cosmetics article LP image. Payment method explanation infographic on cream/white background with a thin coral/brown decorative border. Large bold Japanese headline at top explaining the payment method. Below, 3 steps shown horizontally: each step has a cute illustration (delivery person, woman checking product, wallet/payment) inside a warm-toned circle, with a colored label tab above (like 受け取り, 商品確認, お支払い) and Japanese explanatory text below each. Connected by arrow indicators. Friendly illustration style, warm brown/coral/beige color palette. Reassuring and clear." },

    // ===== CTA・緊急性 =====
    campaign_gold: { icon: "✨", name: "キャンペーン見出し", desc: "ゴールド背景+大見出し", category: "CTA・緊急性",
      prompt: "Japanese cosmetics article LP image. Luxurious campaign announcement banner. Background is a warm golden bokeh/sparkle gradient (champagne gold to soft white light). Centered large bold Japanese text in gold/dark brown with a slight 3D emboss effect — announcing a campaign or special offer (like 'モニター募集' or 'キャンペーン'). Smaller ruby text annotation above the main text. The mood is premium, exciting, special occasion. No product or person — purely typographic with luxurious gold particle background." },
    discount_appeal: { icon: "🏷️", name: "割引訴求（イラスト）", desc: "イラスト+割引率の大文字", category: "CTA・緊急性",
      prompt: "Japanese cosmetics article LP image. Soft pink/cream background. Upper area has two small speech-bubble badges with short Japanese benefit phrases (like '個人情報不要！' and '1分で終わる！'). Center shows a cute simple line-art illustration of a relaxed woman using a smartphone on a bed/couch. Below the illustration, bold Japanese text building to a HUGE discount number (like '55%OFF!') in coral/red extra-large font with a decorative star. The overall feel is casual, approachable, and exciting about the deal. Warm pink/coral palette, manga-influenced illustration style." },
    cost_per_use: { icon: "🪙", name: "コスパ訴求（1回あたり）", desc: "イラスト+インパクトのある単価表示", category: "CTA・緊急性",
      prompt: "Japanese cosmetics article LP image. Soft pink/cream background. A cute simple line-art illustration of a happy woman making an 'OK' hand gesture, smiling brightly. Above her head, several coin illustrations (10-yen, 100-yen style Japanese coins) floating. Large bold Japanese text reading '1回あたり' (per use) at the top, and a HUGE price number below (like '約37円') in coral/salmon extra-large bold font. The mood is cheerful and 'wow, that's cheap!'. Simple line-art illustration style with warm pink/beige/coral palette." },
    urgency_notice: { icon: "⚠️", name: "緊急性・注意喚起", desc: "警告風カード+注意テキスト", category: "CTA・緊急性",
      prompt: "Japanese cosmetics article LP image. Clean white card with a thin dashed coral/red decorative border (rounded corners). At the top, a decorative Japanese heading in coral/red handwriting-style font saying 'ご注意ください' (Please note). Below, centered serious Japanese text warning about limited availability (e.g. 'Orders are flooding in, campaign may end without notice'). A small product image positioned to the right side of the card. The mood is polite but urgent — creating FOMO without being aggressive. White background, coral/red accent text, clean minimal layout." },
  };

  // --- DOM ---
  const apiKeyInput = document.getElementById("apiKeyInput");
  const saveKeyBtn = document.getElementById("saveKeyBtn");
  const keyStatus = document.getElementById("keyStatus");
  const uploadArea = document.getElementById("uploadArea");
  const fileInput = document.getElementById("fileInput");
  const articleText = document.getElementById("articleText");
  const splitBtn = document.getElementById("splitBtn");
  const sectionsList = document.getElementById("sectionsList");
  const generateBtn = document.getElementById("generateBtn");
  const diagramsOutput = document.getElementById("diagramsOutput");
  const backBtn = document.getElementById("backBtn");
  const downloadAllBtn = document.getElementById("downloadAllBtn");
  const loadingEl = document.getElementById("loading");
  const loadingText = document.getElementById("loadingText");
  const stepsEl = {
    step1: document.getElementById("step1"),
    step2: document.getElementById("step2"),
    step3: document.getElementById("step3"),
  };

  let sections = [];
  let generatedDiagrams = [];

  // --- Load reference images from admin page's localStorage ---
  function getRefImages() {
    try {
      const data = JSON.parse(localStorage.getItem("admin_ref_images") || "[]");

  // --- Gemini Text API (2.5 Flash for text tasks) ---
  async function callGeminiText(prompt, maxTokens = 16384) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。上部にGemini APIキーを入力してください。");
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: maxTokens, thinkingConfig: { thinkingBudget: 1024 } },
        }),
      }
    );
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (response.status === 400 || response.status === 403) throw new Error("APIキーが無効です。");
      throw new Error(err.error?.message || `API Error: ${response.status}`);
    }
    const data = await response.json();
    const candidate = data.candidates?.[0];
    if (!candidate?.content?.parts) throw new Error("APIからの応答が空です。");
    const textParts = candidate.content.parts.filter(p => !p.thought && p.text);
    if (textParts.length === 0) throw new Error("テキスト応答がありません。");
    return textParts.map(p => p.text).join("\n");
  }

  // --- Gemini Text+Image Analysis (2.5 Flash — analyzes reference images) ---
  async function callGeminiTextWithImage(prompt, imageBase64) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。");
    const parts = [{ text: prompt }];
    if (imageBase64) {
      parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });
    }
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: { maxOutputTokens: 4096, thinkingConfig: { thinkingBudget: 1024 } },
        }),
      }
    );
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `Text+Image API Error: ${response.status}`);
    }
    const data = await response.json();
    const candidate = data.candidates?.[0];
    if (!candidate?.content?.parts) throw new Error("応答が空です。");
    const textParts = candidate.content.parts.filter(p => !p.thought && p.text);
    return textParts.map(p => p.text).join("\n");
  }

  // --- Gemini Image Generation (3.1 Flash Image — text prompt ONLY, no images) ---
  async function callGeminiImage(englishPrompt) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。");

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 300000);

    try {
      console.log("[Image] Generating with gemini-3.1-flash-image-preview, prompt:", englishPrompt.substring(0, 100));
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({
            contents: [{ parts: [{ text: englishPrompt }] }],
            generationConfig: {
              response_modalities: ["IMAGE"],
            },
          }),
        }
      );
      clearTimeout(timeoutId);

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `Image API Error: ${response.status}`);
      }
      const data = await response.json();
      console.log("[Image] Response received");

      const parts = data.candidates?.[0]?.content?.parts;
      if (!parts) throw new Error("画像生成の応答が空です。");

      for (const part of parts) {
        const inline = part.inlineData || part.inline_data;
        if (inline) {
          return {
            imageData: {
              mimeType: inline.mimeType || inline.mime_type || "image/png",
              data: inline.data,
            }
          };
        }
      }
      throw new Error("画像データが含まれていませんでした。");

    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === "AbortError") throw new Error("画像生成がタイムアウトしました (5分)。再度お試しください。");
      throw err;
    }
  }

  // --- Compress reference image to reduce API payload ---
  function compressRefImage(dataUrl, maxDim = 512) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          const ratio = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL("image/jpeg", 0.7);
        resolve(compressed.replace(/^data:image\/[^;]+;base64,/, ""));
      };
      img.onerror = () => {
        // Fallback: return original
        resolve(dataUrl.replace(/^data:image\/[^;]+;base64,/, ""));
      };
      img.src = dataUrl;
    });
  }

  // --- Composite image + text on Canvas (LP-quality) ---
  function compositeImage(imgBlobUrl, textPlan, canvasWidth = 1280, canvasHeight = 720) {
    return new Promise((resolve) => {
      const canvas = document.createElement("canvas");
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        // Draw background image
        const imgRatio = img.width / img.height;
        const canvasRatio = canvasWidth / canvasHeight;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (imgRatio > canvasRatio) {
          sw = img.height * canvasRatio;
          sx = (img.width - sw) / 2;
        } else {
          sh = img.width / canvasRatio;
          sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);

        // Gradient overlay: darker at top and bottom for text areas
        const gradTop = ctx.createLinearGradient(0, 0, 0, canvasHeight * 0.45);
        gradTop.addColorStop(0, "rgba(0,0,0,0.55)");
        gradTop.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gradTop;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight * 0.45);

        const gradBottom = ctx.createLinearGradient(0, canvasHeight * 0.55, 0, canvasHeight);
        gradBottom.addColorStop(0, "rgba(0,0,0,0)");
        gradBottom.addColorStop(1, "rgba(0,0,0,0.5)");
        ctx.fillStyle = gradBottom;
        ctx.fillRect(0, canvasHeight * 0.55, canvasWidth, canvasHeight * 0.45);

        // Render texts
        if (textPlan?.texts) {
          for (const t of textPlan.texts) {
            const x = (t.x || 0.5) * canvasWidth;
            const y = (t.y || 0.5) * canvasHeight;
            const fontSize = Math.round((t.fontSize || 0.05) * canvasHeight);
            const maxW = (t.maxWidth || 0.85) * canvasWidth;
            const isHeadline = t.role === "headline";

            ctx.font = `900 ${fontSize}px "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const lines = wrapText(ctx, t.text, maxW);
            const lineHeight = fontSize * 1.4;
            const startY = y - ((lines.length - 1) * lineHeight) / 2;

            lines.forEach((line, li) => {
              const ly = startY + li * lineHeight;

              if (isHeadline) {
                // Headline: bold with accent color band behind
                const lw = ctx.measureText(line).width;
                // Draw accent band
                const bandH = fontSize * 1.3;
                const bandY = ly - bandH / 2;
                ctx.fillStyle = t.accentColor || "#FF6B6B";
                ctx.globalAlpha = 0.85;
                // Rounded rect band
                const bandX = x - lw / 2 - fontSize * 0.4;
                const bandW = lw + fontSize * 0.8;
                const r = bandH * 0.15;
                ctx.beginPath();
                ctx.moveTo(bandX + r, bandY);
                ctx.lineTo(bandX + bandW - r, bandY);
                ctx.quadraticCurveTo(bandX + bandW, bandY, bandX + bandW, bandY + r);
                ctx.lineTo(bandX + bandW, bandY + bandH - r);
                ctx.quadraticCurveTo(bandX + bandW, bandY + bandH, bandX + bandW - r, bandY + bandH);
                ctx.lineTo(bandX + r, bandY + bandH);
                ctx.quadraticCurveTo(bandX, bandY + bandH, bandX, bandY + bandH - r);
                ctx.lineTo(bandX, bandY + r);
                ctx.quadraticCurveTo(bandX, bandY, bandX + r, bandY);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // White text
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText(line, x, ly);
              } else {
                // Sub text: simple white with shadow
                ctx.save();
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 2;
                ctx.fillStyle = t.color || "#FFFFFF";
                ctx.fillText(line, x, ly);
                ctx.restore();
              }
            });
          }
        }

        canvas.toBlob((blob) => resolve(blob), "image/png");
      };
      img.onerror = () => {
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        canvas.toBlob((blob) => resolve(blob), "image/png");
      };
      img.src = imgBlobUrl;
    });
  }

  function wrapText(ctx, text, maxWidth) {
    const chars = text.split("");
    const lines = [];
    let currentLine = "";
    for (const char of chars) {
      const testLine = currentLine + char;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = char;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function renderDiagrams() {
    diagramsOutput.innerHTML = "";
    for (let i = 0; i < generatedDiagrams.length; i++) {
      const d = generatedDiagrams[i];
      const card = document.createElement("div");
      card.className = "diagram-card";

      card.innerHTML = `
        <div class="diagram-card-header">
          <h3>${esc(d.title)} <span style="font-size:0.8rem;color:#888;font-weight:400;">— ${esc(d.typeName)}</span></h3>
          <div class="diagram-actions">
            <button class="btn-sm" data-action="dl-png" data-index="${i}">PNGダウンロード</button>
          </div>
        </div>
        <div class="diagram-card-body"></div>
        <div class="diagram-summary">${esc(d.summary)}</div>
      `;

      const img = document.createElement("img");
      img.src = URL.createObjectURL(d.compositeBlob);
      img.alt = d.title;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "8px";
      card.querySelector(".diagram-card-body").appendChild(img);

      diagramsOutput.appendChild(card);
    }
  }

  // --- Download ---
  diagramsOutput.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const idx = parseInt(btn.dataset.index);
    const d = generatedDiagrams[idx];
    if (!d) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(d.compositeBlob);
    a.download = `${d.title}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  downloadAllBtn.addEventListener("click", () => {
    generatedDiagrams.forEach(d => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(d.compositeBlob);
      a.download = `${d.title}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  });

  // --- Navigation ---
  backBtn.addEventListener("click", () => showStep("step2"));

  // --- Helpers ---
  function showStep(id) { Object.values(stepsEl).forEach(s => s.classList.remove("active")); stepsEl[id].classList.add("active"); window.scrollTo({ top: 0, behavior: "smooth" }); }
  function showLoading(msg) { loadingText.textContent = msg; loadingEl.classList.remove("hidden"); }
  function hideLoading() { loadingEl.classList.add("hidden"); }
  function showError(container, msg) {
    const ex = container.querySelector(".error-msg"); if (ex) ex.remove();
    const el = document.createElement("div"); el.className = "error-msg"; el.textContent = msg;
    container.appendChild(el); setTimeout(() => el.remove(), 10000);
  }
  function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
});
</script>
</body>
</html>
