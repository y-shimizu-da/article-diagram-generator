<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事広告 作図生成ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
    .subtitle { color: #666; margin-top: 6px; font-size: 0.95rem; }

    /* API Key Bar */
    .api-key-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 16px 24px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-key-bar label { font-size: 0.85rem; font-weight: 600; color: #555; white-space: nowrap; }
    .api-key-bar input {
      flex: 1; min-width: 200px; padding: 8px 12px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; font-family: monospace;
    }
    .api-key-bar input:focus { outline: none; border-color: #4361ee; }
    .api-key-bar .status { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
    .api-key-bar .status.saved { background: #e8f5e9; color: #2e7d32; }
    .api-key-bar .status.empty { background: #fff3e0; color: #e65100; }
    .api-key-bar .btn-save-key {
      padding: 8px 16px; background: #4361ee; color: #fff; border: none;
      border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .api-key-bar .btn-save-key:hover { background: #3651d4; }

    /* Steps */
    .step {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px; overflow: hidden; display: none;
    }
    .step.active { display: block; }
    .step-header {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 24px; border-bottom: 1px solid #eee;
    }
    .step-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: #4361ee; color: #fff;
      border-radius: 50%; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
    }
    .step-header h2 { font-size: 1.15rem; font-weight: 600; }
    .step-content { padding: 24px; }

    /* Upload */
    .upload-area {
      border: 2.5px dashed #ccc; border-radius: 14px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #4361ee; background: #f8f9ff; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-area p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 20px 0; color: #aaa; font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ddd; }
    textarea {
      width: 100%; min-height: 200px; padding: 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; line-height: 1.7; resize: vertical; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #4361ee; }

    /* Buttons */
    .btn {
      display: inline-block; padding: 12px 28px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 16px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #4361ee; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #3651d4; }
    .btn.secondary { background: #e9ecef; color: #495057; }
    .btn.secondary:hover:not(:disabled) { background: #dee2e6; }

    /* Section Cards */
    .section-card {
      border: 1px solid #eee; border-radius: 10px;
      margin-bottom: 4px; overflow: hidden; transition: all 0.2s;
      position: relative;
    }
    .section-card.selected { border-color: #4361ee; box-shadow: 0 0 0 1px #4361ee; }
    .section-card.merge-target { border-color: #f59e0b; background: #fffbeb; }
    .section-card-header {
      display: flex; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.2s;
    }
    .section-card-header:hover { background: #fafbff; }
    .section-card-header input[type="checkbox"] {
      margin-top: 3px; flex-shrink: 0; width: 18px; height: 18px; accent-color: #4361ee;
    }
    .section-info { flex: 1; min-width: 0; }
    .section-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .section-title { font-weight: 600; font-size: 0.95rem; }
    .section-index {
      font-size: 0.7rem; background: #e9ecef; color: #666; padding: 1px 6px;
      border-radius: 4px; flex-shrink: 0;
    }
    .section-preview {
      color: #777; font-size: 0.82rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Section action buttons */
    .section-actions {
      display: flex; gap: 4px; padding: 0 16px 10px; flex-wrap: wrap;
    }
    .section-actions button {
      font-size: 0.72rem; padding: 4px 10px; border: 1px solid #ddd;
      background: #fff; border-radius: 5px; cursor: pointer; transition: all 0.15s;
      color: #555; white-space: nowrap;
    }
    .section-actions button:hover { background: #f0f3ff; border-color: #4361ee; color: #4361ee; }
    .section-actions button.danger:hover { background: #fff0f0; border-color: #e53e3e; color: #e53e3e; }

    /* Merge connector */
    .merge-connector {
      text-align: center; padding: 2px 0; display: none;
    }
    .merge-connector.visible { display: block; }
    .merge-connector button {
      font-size: 0.72rem; padding: 3px 12px; border: 1px dashed #f59e0b;
      background: #fffbeb; border-radius: 12px; cursor: pointer; color: #b45309;
      transition: all 0.15s;
    }
    .merge-connector button:hover { background: #fef3c7; border-style: solid; }

    /* Per-section diagram type picker */
    .section-type-picker { display: none; padding: 0 16px 16px; border-top: 1px solid #f0f0f0; }
    .section-card.selected .section-type-picker { display: block; }
    .section-type-picker h4 {
      font-size: 0.75rem; font-weight: 600; color: #888;
      margin: 12px 0 8px; letter-spacing: 0.5px;
    }
    .type-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px;
    }
    .type-grid label { display: block; }
    .type-grid input { display: none; }
    .type-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 9px; border: 1.5px solid #eee; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; font-size: 0.78rem;
    }
    .type-chip:hover { border-color: #b0c4ff; background: #f8f9ff; }
    .type-grid input:checked + .type-chip { border-color: #4361ee; background: #eef1ff; font-weight: 600; }
    .type-chip-icon { font-size: 1rem; flex-shrink: 0; }
    .type-chip-label { line-height: 1.3; }
    .type-chip-name { display: block; font-size: 0.78rem; }
    .type-chip-desc { display: block; font-size: 0.62rem; color: #999; font-weight: 400; }
    .type-category { margin-bottom: 8px; }

    /* Diagram Output */
    .diagram-card {
      border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }
    .diagram-card-header {
      padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .diagram-card-header h3 { font-size: 1rem; font-weight: 600; }
    .diagram-card-body { padding: 24px; display: flex; justify-content: center; overflow-x: auto; }
    .diagram-summary {
      padding: 12px 18px; background: #f0f3ff; border-top: 1px solid #e8ecff;
      font-size: 0.88rem; color: #444; line-height: 1.6;
    }
    .diagram-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm {
      padding: 6px 14px; font-size: 0.8rem; border: 1px solid #ddd;
      background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { background: #f0f3ff; border-color: #4361ee; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }

    /* Loading */
    .loading {
      position: fixed; inset: 0; background: rgba(255,255,255,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .loading.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid #e9ecef; border-top-color: #4361ee;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingText { font-size: 0.95rem; color: #555; }
    .error-msg {
      background: #fff0f0; color: #c33; padding: 12px 16px;
      border-radius: 8px; margin-top: 12px; font-size: 0.9rem;
    }
    .hint-text { font-size: 0.82rem; color: #888; margin-bottom: 16px; line-height: 1.6; }

    @media (max-width: 600px) {
      .container { padding: 12px 8px 40px; }
      header h1 { font-size: 1.4rem; }
      .type-grid { grid-template-columns: repeat(2, 1fr); }
      .api-key-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>記事広告 作図生成ツール</h1>
      <p class="subtitle">記事原稿から理解促進用の図を自動生成します</p>
    </header>

    <div class="api-key-bar">
      <label>Gemini API Key:</label>
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
      <button class="btn-save-key" id="saveKeyBtn">保存</button>
      <span class="status" id="keyStatus"></span>
    </div>

    <!-- Step 1 -->
    <section id="step1" class="step active">
      <div class="step-header">
        <span class="step-number">1</span>
        <h2>記事原稿をアップロード</h2>
      </div>
      <div class="step-content">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📄</div>
          <p>テキストファイルをドラッグ&ドロップ<br>またはクリックして選択</p>
          <input type="file" id="fileInput" accept=".txt,.md,.text" hidden>
        </div>
        <div class="divider"><span>または</span></div>
        <textarea id="articleText" placeholder="記事原稿をここに貼り付けてください..."></textarea>
        <button id="splitBtn" class="btn primary" disabled>文脈を分析する</button>
      </div>
    </section>

    <!-- Step 2 -->
    <section id="step2" class="step">
      <div class="step-header">
        <span class="step-number">2</span>
        <h2>文脈を編集し、作図タイプを指定</h2>
      </div>
      <div class="step-content">
        <p class="hint-text">
          チェックで作図対象を選択。各セクションごとに図のタイプを指定できます。<br>
          「結合」で隣のセクションと統合、「分割」でセクションをさらに細かく分けられます。
        </p>
        <div id="sectionsList"></div>
        <button id="generateBtn" class="btn primary" disabled>選択した文脈の図を生成</button>
      </div>
    </section>

    <!-- Step 3 -->
    <section id="step3" class="step">
      <div class="step-header">
        <span class="step-number">3</span>
        <h2>生成された図</h2>
      </div>
      <div class="step-content">
        <div id="diagramsOutput"></div>
        <div class="actions">
          <button id="backBtn" class="btn secondary">文脈選択に戻る</button>
          <button id="downloadAllBtn" class="btn primary">すべてダウンロード</button>
        </div>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loadingText">分析中...</p>
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  mermaid.initialize({
    startOnLoad: false, theme: "default", securityLevel: "loose",
    fontFamily: '"Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif',
  });

  const DIAGRAM_TYPES = {
    flowchart:    { icon: "🔀", name: "フローチャート",     desc: "手順・プロセスの流れ",       category: "基本",       mermaid: "フローチャート（flowchart TD）" },
    mindmap:      { icon: "🧠", name: "マインドマップ",     desc: "概念の関連・全体像",         category: "基本",       mermaid: "マインドマップ（mindmap）" },
    timeline:     { icon: "📅", name: "タイムライン",       desc: "時系列の変化",               category: "基本",       mermaid: "タイムライン（timeline）" },
    beforeafter:  { icon: "🔄", name: "ビフォーアフター",   desc: "使用前後の変化",             category: "通販LP向け", mermaid: "ビフォーアフター比較図（flowchart LR で左に『Before』右に『After』のsubgraphを配置し、矢印で変化を示す）" },
    problem:      { icon: "💡", name: "悩み→解決",          desc: "課題から解決策への流れ",     category: "通販LP向け", mermaid: "悩み→解決フロー（flowchart TD で上部に悩み・課題を赤系ノード、下部に解決策・効果を緑系ノードで配置。スタイルでfill色を指定）" },
    uservoice:    { icon: "💬", name: "ユーザーの声",       desc: "口コミ・体験談の整理",       category: "通販LP向け", mermaid: "ユーザーの声・体験談まとめ（flowchart TD で中央に商品ノード、周囲に吹き出し風ノードで各ユーザーの声を配置）" },
    comparison:   { icon: "⚖️", name: "商品比較表",         desc: "他社比較・スペック比較",     category: "通販LP向け", mermaid: "比較表（flowchart LR でsubgraphを並べて各項目の比較をノードで表現）" },
    ingredients:  { icon: "🧪", name: "成分・特徴",         desc: "成分や機能の分解",           category: "通販LP向け", mermaid: "成分・特徴の構造図（mindmap で中央に商品名、枝に各成分・特徴とその効果を配置）" },
    steps:        { icon: "👣", name: "使い方ステップ",     desc: "使用方法の手順",             category: "通販LP向け", mermaid: "使い方ステップ図（flowchart TD でSTEP1→STEP2→STEP3...の縦フロー、各ステップにアイコン的ラベル付き）" },
    ranking:      { icon: "🏆", name: "ランキング",         desc: "順位・人気度の可視化",       category: "通販LP向け", mermaid: "ランキング図（flowchart TD で1位→2位→3位の縦並び、各ノードに順位と項目名。1位ノードは太枠で強調）" },
    evidence:     { icon: "📊", name: "実績・数字",         desc: "データや数値の図解",         category: "信頼・説得", mermaid: "実績・数字の図解（flowchart LR で各実績数値を大きなラベルのノードで横並びに配置）" },
    mechanism:    { icon: "⚙️", name: "メカニズム",         desc: "なぜ効くのか・仕組み",       category: "信頼・説得", mermaid: "メカニズム説明図（flowchart TD で原因→作用→結果の因果関係を矢印で示す）" },
    guarantee:    { icon: "🛡️", name: "安心・保証",         desc: "保証内容・安心ポイント",     category: "信頼・説得", mermaid: "安心ポイントまとめ（flowchart TD で中央に『安心のポイント』ノード、放射状に各保証・安心要素を接続）" },
    faq:          { icon: "❓", name: "FAQ",                desc: "よくある質問と回答",         category: "信頼・説得", mermaid: "FAQ図（flowchart TD でQ→Aのペアを縦に並べて配置。Qノードは青系、Aノードは緑系で色分け）" },
  };

  const apiKeyInput = document.getElementById("apiKeyInput");
  const saveKeyBtn = document.getElementById("saveKeyBtn");
  const keyStatus = document.getElementById("keyStatus");
  const uploadArea = document.getElementById("uploadArea");
  const fileInput = document.getElementById("fileInput");
  const articleText = document.getElementById("articleText");
  const splitBtn = document.getElementById("splitBtn");
  const sectionsList = document.getElementById("sectionsList");
  const generateBtn = document.getElementById("generateBtn");
  const diagramsOutput = document.getElementById("diagramsOutput");
  const backBtn = document.getElementById("backBtn");
  const downloadAllBtn = document.getElementById("downloadAllBtn");
  const loadingEl = document.getElementById("loading");
  const loadingText = document.getElementById("loadingText");
  const stepsEl = {
    step1: document.getElementById("step1"),
    step2: document.getElementById("step2"),
    step3: document.getElementById("step3"),
  };

  let sections = [];
  let generatedDiagrams = [];

  // --- API Key ---
  function getApiKey() { return localStorage.getItem("gemini_api_key") || ""; }
  function updateKeyStatus() {
    const key = getApiKey();
    if (key) { keyStatus.textContent = "設定済み"; keyStatus.className = "status saved"; apiKeyInput.value = key; }
    else { keyStatus.textContent = "未設定"; keyStatus.className = "status empty"; }
  }
  saveKeyBtn.addEventListener("click", () => {
    const key = apiKeyInput.value.trim();
    if (key) localStorage.setItem("gemini_api_key", key); else localStorage.removeItem("gemini_api_key");
    updateKeyStatus();
  });
  updateKeyStatus();

  // --- Gemini API ---
  async function callGemini(prompt, maxTokens = 16384) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。上部にGemini APIキーを入力してください。");
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: maxTokens, thinkingConfig: { thinkingBudget: 1024 } },
        }),
      }
    );
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (response.status === 400 || response.status === 403) throw new Error("APIキーが無効です。正しいGemini APIキーを設定してください。");
      throw new Error(err.error?.message || `API Error: ${response.status}`);
    }
    const data = await response.json();
    const candidate = data.candidates?.[0];
    if (!candidate?.content?.parts) throw new Error("APIからの応答が空です。もう一度お試しください。");
    const textParts = candidate.content.parts.filter(p => !p.thought && p.text);
    if (textParts.length === 0) throw new Error("APIからのテキスト応答がありません。");
    return textParts.map(p => p.text).join("\n");
  }

  // --- Step 1: Upload ---
  uploadArea.addEventListener("click", () => fileInput.click());
  uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("dragover"); });
  uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
  uploadArea.addEventListener("drop", (e) => {
    e.preventDefault(); uploadArea.classList.remove("dragover");
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });
  function readFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => { articleText.value = e.target.result; updateSplitBtn(); };
    reader.readAsText(file);
  }
  articleText.addEventListener("input", updateSplitBtn);
  function updateSplitBtn() { splitBtn.disabled = !articleText.value.trim(); }

  // --- Split Article (fine-grained) ---
  splitBtn.addEventListener("click", async () => {
    const text = articleText.value.trim();
    if (!text) return;
    showLoading("記事を文脈ごとに細かく分析中...");
    try {
      const prompt = `以下の記事広告の原稿を、できるだけ細かい意味的なまとまり（文脈）ごとに分割してください。

ルール:
- 1つのセクションは1つの話題・1つの主張・1つのエピソードだけを含むようにしてください
- たとえば「悩みの描写」「商品の紹介」「成分の説明」「使用者の声（1人分）」「価格情報」「特典情報」「注意書き」などはそれぞれ別セクションにしてください
- 1文〜3文程度の短いセクションになっても構いません。細かいほど良いです
- 見出し、改行、話題の転換を手がかりに積極的に分割してください
- 各セクションには「title」（要約タイトル、15文字以内）と「content」（原文テキスト）を含めてください
- JSON配列で返してください。JSONのみを返し、他のテキストは含めないでください

出力形式:
[
  {"title": "セクションタイトル", "content": "セクションの本文..."},
  ...
]

記事原稿:
${text}`;

      const result = await callGemini(prompt);
      const cleaned = result.replace(/\`\`\`json\s*/g, "").replace(/\`\`\`\s*/g, "").trim();
      const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("セクション分割の解析に失敗しました。APIレスポンス: " + result.substring(0, 200));
      sections = JSON.parse(jsonMatch[0]);
      if (sections.length === 0) throw new Error("セクションが見つかりませんでした");
      renderSections();
      showStep("step2");
    } catch (err) {
      showError(stepsEl.step1.querySelector(".step-content"), err.message);
    } finally { hideLoading(); }
  });

  // ============================
  // Step 2: Section editing UI
  // ============================
  function buildTypePickerHTML(uid) {
    const categories = {};
    for (const [key, t] of Object.entries(DIAGRAM_TYPES)) {
      if (!categories[t.category]) categories[t.category] = [];
      categories[t.category].push({ key, ...t });
    }
    let html = "";
    for (const [cat, types] of Object.entries(categories)) {
      html += `<div class="type-category"><h4>${esc(cat)}</h4><div class="type-grid">`;
      types.forEach((t, idx) => {
        const checked = (cat === "基本" && idx === 0) ? "checked" : "";
        html += `<label><input type="radio" name="dtype-${uid}" value="${t.key}" ${checked}><span class="type-chip"><span class="type-chip-icon">${t.icon}</span><span class="type-chip-label"><span class="type-chip-name">${esc(t.name)}</span><span class="type-chip-desc">${esc(t.desc)}</span></span></span></label>`;
      });
      html += `</div></div>`;
    }
    return html;
  }

  function renderSections() {
    sectionsList.innerHTML = "";
    sections.forEach((sec, i) => {
      // Merge connector (between sections)
      if (i > 0) {
        const conn = document.createElement("div");
        conn.className = "merge-connector";
        conn.innerHTML = `<button data-merge-above="${i}">↕ 上のセクションと結合</button>`;
        conn.querySelector("button").addEventListener("click", () => mergeSections(i - 1, i));
        sectionsList.appendChild(conn);
      }

      const uid = `s${i}-${Date.now()}`;
      const card = document.createElement("div");
      card.className = "section-card";
      card.dataset.sectionIndex = i;
      card.innerHTML = `
        <div class="section-card-header">
          <input type="checkbox" data-index="${i}">
          <div class="section-info">
            <div class="section-title-row">
              <span class="section-index">${i + 1} / ${sections.length}</span>
              <span class="section-title">${esc(sec.title)}</span>
            </div>
            <div class="section-preview">${esc(sec.content)}</div>
          </div>
        </div>
        <div class="section-actions">
          <button data-split="${i}">✂ このセクションを分割</button>
          ${i < sections.length - 1 ? `<button data-merge-next="${i}">⏬ 下と結合</button>` : ""}
        </div>
        <div class="section-type-picker">${buildTypePickerHTML(uid)}</div>
      `;

      // Checkbox toggle
      const header = card.querySelector(".section-card-header");
      header.addEventListener("click", (e) => {
        if (e.target.tagName !== "INPUT") {
          const cb = card.querySelector("input[type=checkbox]");
          cb.checked = !cb.checked;
        }
        card.classList.toggle("selected", card.querySelector("input[type=checkbox]").checked);
        updateMergeConnectors();
        updateGenerateBtn();
      });

      // Split button
      const splitBtnEl = card.querySelector("[data-split]");
      if (splitBtnEl) splitBtnEl.addEventListener("click", (e) => { e.stopPropagation(); splitSection(i); });

      // Merge next button
      const mergeBtn = card.querySelector("[data-merge-next]");
      if (mergeBtn) mergeBtn.addEventListener("click", (e) => { e.stopPropagation(); mergeSections(i, i + 1); });

      sectionsList.appendChild(card);
    });
    updateMergeConnectors();
    updateGenerateBtn();
  }

  function updateMergeConnectors() {
    // Show merge connectors between adjacent selected cards
    const connectors = sectionsList.querySelectorAll(".merge-connector");
    connectors.forEach(c => c.classList.remove("visible"));
  }

  function updateGenerateBtn() {
    generateBtn.disabled = sectionsList.querySelectorAll("input[type=checkbox]:checked").length === 0;
  }

  // --- Merge two adjacent sections ---
  function mergeSections(idxA, idxB) {
    if (idxA < 0 || idxB >= sections.length) return;
    const a = sections[idxA];
    const b = sections[idxB];
    const merged = {
      title: a.title.length >= b.title.length ? a.title : b.title,
      content: a.content + "\n" + b.content,
    };
    sections.splice(idxA, 2, merged);
    renderSections();
  }

  // --- Split a section using Gemini ---
  async function splitSection(idx) {
    const sec = sections[idx];
    showLoading(`「${sec.title}」を分割中...`);
    try {
      const prompt = `以下のテキストを、さらに細かい意味のまとまりに分割してください。
最低2つ以上のセクションに分けてください。1文〜2文の短いセクションでもOKです。

ルール:
- 各セクションには「title」（15文字以内の要約）と「content」（原文テキスト）を含める
- JSON配列のみ返してください

テキスト:
${sec.content}`;

      const result = await callGemini(prompt, 8192);
      const cleaned = result.replace(/\`\`\`json\s*/g, "").replace(/\`\`\`\s*/g, "").trim();
      const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("分割に失敗しました");
      const subSections = JSON.parse(jsonMatch[0]);
      if (subSections.length < 2) throw new Error("これ以上分割できません");

      // Replace the section with sub-sections
      sections.splice(idx, 1, ...subSections);
      renderSections();
    } catch (err) {
      showError(stepsEl.step2.querySelector(".step-content"), err.message);
    } finally { hideLoading(); }
  }

  // --- Generate Diagrams ---
  generateBtn.addEventListener("click", async () => {
    const cards = sectionsList.querySelectorAll(".section-card");
    const selected = [];
    cards.forEach((card) => {
      const cb = card.querySelector("input[type=checkbox]");
      if (!cb.checked) return;
      const idx = parseInt(cb.dataset.index);
      const typeRadio = card.querySelector("input[type=radio]:checked");
      selected.push({ idx, diagramType: typeRadio ? typeRadio.value : "flowchart" });
    });
    if (selected.length === 0) return;

    showLoading("図を生成中...");
    generatedDiagrams = [];
    diagramsOutput.innerHTML = "";

    try {
      for (let i = 0; i < selected.length; i++) {
        const { idx, diagramType } = selected[i];
        const section = sections[idx];
        const typeInfo = DIAGRAM_TYPES[diagramType] || DIAGRAM_TYPES.flowchart;
        loadingText.textContent = `図を生成中... (${i + 1}/${selected.length}) ${section.title}`;

        const diagramPrompt = `以下の記事セクションの内容を読者が視覚的に理解できるよう、Mermaid.js の${typeInfo.mermaid}として作図してください。

ルール:
- 記事の内容を正確に反映すること
- 読者の理解を促進する構成にすること
- 通販の記事LP（ランディングページ）に挿入される図であることを意識し、読みやすくわかりやすい構成にすること
- ノードのテキストは簡潔に（各ノード20文字以内）
- 日本語で記述すること
- Mermaid.jsの正しい構文で出力すること
- コードブロック（\`\`\`mermaid ... \`\`\`）の中身だけを返してください
- ノードIDには日本語やスペースを使わず、英数字のみを使ってください
- ノードのラベルは["テキスト"] の形式で日本語を囲んでください
- subgraphのタイトルも日本語OKです
- style文でノードに色を付ける場合、fill,stroke,colorの形式で指定してください

セクションタイトル: ${section.title}
セクション内容:
${section.content}`;

        const mermaidRaw = await callGemini(diagramPrompt);
        const mermaidCode = mermaidRaw.replace(/```mermaid\s*/g, "").replace(/```\s*/g, "").trim();

        const summaryPrompt = `以下の記事セクションの内容を、図の説明文として1〜2文で要約してください。
セクションタイトル: ${section.title}
セクション内容: ${section.content}`;
        const summary = await callGemini(summaryPrompt, 512);

        generatedDiagrams.push({ title: section.title, typeName: typeInfo.name, mermaidCode, summary: summary.trim() });
      }
      await renderDiagrams();
      showStep("step3");
    } catch (err) {
      showError(stepsEl.step2.querySelector(".step-content"), err.message);
    } finally { hideLoading(); }
  });

  async function renderDiagrams() {
    diagramsOutput.innerHTML = "";
    for (let i = 0; i < generatedDiagrams.length; i++) {
      const d = generatedDiagrams[i];
      const card = document.createElement("div");
      card.className = "diagram-card";
      const diagramId = `mermaid-${i}-${Date.now()}`;
      card.innerHTML = `
        <div class="diagram-card-header">
          <h3>${esc(d.title)} <span style="font-size:0.8rem;color:#888;font-weight:400;">— ${esc(d.typeName)}</span></h3>
          <div class="diagram-actions">
            <button class="btn-sm" data-action="copy-svg" data-id="${diagramId}">SVGコピー</button>
            <button class="btn-sm" data-action="dl-svg" data-id="${diagramId}" data-title="${esc(d.title)}">SVG DL</button>
            <button class="btn-sm" data-action="dl-png" data-id="${diagramId}" data-title="${esc(d.title)}">PNG DL</button>
          </div>
        </div>
        <div class="diagram-card-body"><div class="mermaid-container" id="${diagramId}"></div></div>
        <div class="diagram-summary">${esc(d.summary)}</div>
      `;
      diagramsOutput.appendChild(card);
      try {
        const { svg } = await mermaid.render(diagramId + "-svg", d.mermaidCode);
        card.querySelector(".mermaid-container").innerHTML = svg;
      } catch (err) {
        card.querySelector(".mermaid-container").innerHTML = `<div class="error-msg">図のレンダリングに失敗しました。<pre style="margin-top:8px;font-size:0.8rem;white-space:pre-wrap">${esc(d.mermaidCode)}</pre></div>`;
      }
    }
  }

  // --- Diagram Actions ---
  diagramsOutput.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const { action, id, title } = btn.dataset;
    const svg = document.getElementById(id)?.querySelector("svg");
    if (!svg) return;
    if (action === "copy-svg") {
      navigator.clipboard.writeText(new XMLSerializer().serializeToString(svg)).then(() => alert("SVGコピーしました"));
    } else if (action === "dl-svg") { dlSvg(svg, title || "diagram"); }
    else if (action === "dl-png") { dlPng(svg, title || "diagram"); }
  });

  function dlSvg(svg, title) {
    const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: "image/svg+xml" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${title}.svg`; a.click(); URL.revokeObjectURL(a.href);
  }
  function dlPng(svg, title) {
    const svgData = new XMLSerializer().serializeToString(svg);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas"); c.width = img.width * 2; c.height = img.height * 2;
      const ctx = c.getContext("2d"); ctx.scale(2, 2); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0);
      const a = document.createElement("a"); a.href = c.toDataURL("image/png"); a.download = `${title}.png`; a.click();
    };
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
  }

  // --- Navigation ---
  backBtn.addEventListener("click", () => showStep("step2"));
  downloadAllBtn.addEventListener("click", () => {
    document.querySelectorAll(".diagram-card-body svg").forEach((svg, i) => dlSvg(svg, generatedDiagrams[i]?.title || `diagram-${i}`));
  });

  // --- Helpers ---
  function showStep(id) { Object.values(stepsEl).forEach(s => s.classList.remove("active")); stepsEl[id].classList.add("active"); window.scrollTo({ top: 0, behavior: "smooth" }); }
  function showLoading(msg) { loadingText.textContent = msg; loadingEl.classList.remove("hidden"); }
  function hideLoading() { loadingEl.classList.add("hidden"); }
  function showError(container, msg) {
    const ex = container.querySelector(".error-msg"); if (ex) ex.remove();
    const el = document.createElement("div"); el.className = "error-msg"; el.textContent = msg;
    container.appendChild(el); setTimeout(() => el.remove(), 8000);
  }
  function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
});
</script>
</body>
</html>
