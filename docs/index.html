<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事広告 作図生成ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
    .subtitle { color: #666; margin-top: 6px; font-size: 0.95rem; }

    .api-key-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 16px 24px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-key-bar label { font-size: 0.85rem; font-weight: 600; color: #555; white-space: nowrap; }
    .api-key-bar input {
      flex: 1; min-width: 200px; padding: 8px 12px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; font-family: monospace;
    }
    .api-key-bar input:focus { outline: none; border-color: #4361ee; }
    .api-key-bar .status { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
    .api-key-bar .status.saved { background: #e8f5e9; color: #2e7d32; }
    .api-key-bar .status.empty { background: #fff3e0; color: #e65100; }
    .api-key-bar .btn-save-key {
      padding: 8px 16px; background: #4361ee; color: #fff; border: none;
      border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .api-key-bar .btn-save-key:hover { background: #3651d4; }

    .step {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px; overflow: hidden; display: none;
    }
    .step.active { display: block; }
    .step-header {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 24px; border-bottom: 1px solid #eee;
    }
    .step-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: #4361ee; color: #fff;
      border-radius: 50%; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
    }
    .step-header h2 { font-size: 1.15rem; font-weight: 600; }
    .step-content { padding: 24px; }

    .upload-area {
      border: 2.5px dashed #ccc; border-radius: 14px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #4361ee; background: #f8f9ff; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-area p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 20px 0; color: #aaa; font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ddd; }
    textarea {
      width: 100%; min-height: 200px; padding: 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; line-height: 1.7; resize: vertical; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #4361ee; }

    .btn {
      display: inline-block; padding: 12px 28px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 16px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #4361ee; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #3651d4; }
    .btn.secondary { background: #e9ecef; color: #495057; }
    .btn.secondary:hover:not(:disabled) { background: #dee2e6; }

    .section-card {
      border: 1px solid #eee; border-radius: 10px;
      margin-bottom: 4px; overflow: hidden; transition: all 0.2s;
    }
    .section-card.selected { border-color: #4361ee; box-shadow: 0 0 0 1px #4361ee; }
    .section-card-header {
      display: flex; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.2s;
    }
    .section-card-header:hover { background: #fafbff; }
    .section-card-header input[type="checkbox"] {
      margin-top: 3px; flex-shrink: 0; width: 18px; height: 18px; accent-color: #4361ee;
    }
    .section-info { flex: 1; min-width: 0; }
    .section-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .section-title { font-weight: 600; font-size: 0.95rem; }
    .section-index {
      font-size: 0.7rem; background: #e9ecef; color: #666; padding: 1px 6px;
      border-radius: 4px; flex-shrink: 0;
    }
    .section-preview {
      color: #777; font-size: 0.82rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .section-actions {
      display: flex; gap: 4px; padding: 0 16px 10px; flex-wrap: wrap;
    }
    .section-actions button {
      font-size: 0.72rem; padding: 4px 10px; border: 1px solid #ddd;
      background: #fff; border-radius: 5px; cursor: pointer; transition: all 0.15s;
      color: #555; white-space: nowrap;
    }
    .section-actions button:hover { background: #f0f3ff; border-color: #4361ee; color: #4361ee; }

    .merge-connector { text-align: center; padding: 2px 0; }
    .merge-connector button {
      font-size: 0.72rem; padding: 3px 12px; border: 1px dashed #f59e0b;
      background: #fffbeb; border-radius: 12px; cursor: pointer; color: #b45309;
    }
    .merge-connector button:hover { background: #fef3c7; border-style: solid; }

    .section-type-picker { display: none; padding: 0 16px 16px; border-top: 1px solid #f0f0f0; }
    .section-card.selected .section-type-picker { display: block; }
    .section-type-picker h4 {
      font-size: 0.75rem; font-weight: 600; color: #888; margin: 12px 0 8px; letter-spacing: 0.5px;
    }
    .type-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 6px;
    }
    .type-grid label { display: block; }
    .type-grid input { display: none; }
    .type-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 9px; border: 1.5px solid #eee; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; font-size: 0.78rem;
    }
    .type-chip:hover { border-color: #b0c4ff; background: #f8f9ff; }
    .type-grid input:checked + .type-chip { border-color: #4361ee; background: #eef1ff; font-weight: 600; }
    .type-chip-icon { font-size: 1rem; flex-shrink: 0; }
    .type-chip-label { line-height: 1.3; }
    .type-chip-name { display: block; font-size: 0.78rem; }
    .type-chip-desc { display: block; font-size: 0.62rem; color: #999; font-weight: 400; }
    .type-category { margin-bottom: 8px; }

    /* Diagram Output */
    .diagram-card {
      border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }
    .diagram-card-header {
      padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .diagram-card-header h3 { font-size: 1rem; font-weight: 600; }
    .diagram-card-body { padding: 24px; display: flex; justify-content: center; overflow-x: auto; }
    .diagram-card-body img {
      max-width: 100%; height: auto; border-radius: 8px;
    }
    .diagram-summary {
      padding: 12px 18px; background: #f0f3ff; border-top: 1px solid #e8ecff;
      font-size: 0.88rem; color: #444; line-height: 1.6;
    }
    .diagram-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm {
      padding: 6px 14px; font-size: 0.8rem; border: 1px solid #ddd;
      background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { background: #f0f3ff; border-color: #4361ee; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }

    /* Reference image picker */
    .ref-picker { margin-top: 10px; }
    .ref-picker h4 { font-size: 0.75rem; font-weight: 600; color: #e8788a; margin-bottom: 6px; }
    .ref-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .ref-thumb {
      width: 100px; height: 66px; border: 2px solid #eee; border-radius: 6px;
      overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative;
    }
    .ref-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ref-thumb:hover { border-color: #4361ee; }
    .ref-thumb.selected { border-color: #e8788a; box-shadow: 0 0 0 2px #e8788a; }
    .ref-thumb .ref-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 0.55rem; background: rgba(0,0,0,0.6); color: #fff;
      padding: 1px 4px; text-align: center; white-space: nowrap; overflow: hidden;
    }
    .ref-none {
      font-size: 0.72rem; color: #aaa; padding: 8px;
      border: 1px dashed #ddd; border-radius: 6px; text-align: center;
    }
    .ref-none a { color: #4361ee; }

    /* Inline progress bar (non-blocking) */
    .progress-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 14px 20px; margin-bottom: 16px;
      display: none; align-items: center; gap: 12px;
    }
    .progress-bar.active { display: flex; }
    .progress-bar .spinner-sm {
      width: 22px; height: 22px; border: 3px solid #e9ecef; border-top-color: #4361ee;
      border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar .progress-text { font-size: 0.88rem; color: #555; }

    /* Legacy loading overlay - hidden */
    .loading { display: none !important; }

    /* Regenerate UI on each card */
    .regen-area {
      padding: 12px 18px; border-top: 1px solid #eee; background: #fafbff;
    }
    .regen-area summary {
      font-size: 0.82rem; color: #4361ee; cursor: pointer; font-weight: 600;
      padding: 4px 0;
    }
    .regen-area summary:hover { text-decoration: underline; }
    .regen-area .regen-body { padding-top: 8px; }
    .regen-area textarea {
      width: 100%; min-height: 60px; padding: 8px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.82rem; line-height: 1.5; resize: vertical;
      font-family: inherit; margin-bottom: 8px;
    }
    .regen-area textarea:focus { outline: none; border-color: #4361ee; }
    .regen-area .regen-btn {
      padding: 6px 16px; background: #4361ee; color: #fff; border: none;
      border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .regen-area .regen-btn:hover { background: #3651d4; }
    .regen-area .regen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .regen-area .regen-status { font-size: 0.78rem; color: #888; margin-left: 8px; }
    .error-msg {
      background: #fff0f0; color: #c33; padding: 12px 16px;
      border-radius: 8px; margin-top: 12px; font-size: 0.9rem;
    }
    .hint-text { font-size: 0.82rem; color: #888; margin-bottom: 16px; line-height: 1.6; }

    /* Ref picker filters */
    .ref-filters { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .ref-filters select {
      padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.78rem; background: #fff; color: #333; cursor: pointer;
    }
    .ref-filters select:focus { outline: none; border-color: #4361ee; }

    /* Prompt cards */
    .prompt-card {
      border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 14px;
      overflow: hidden; background: #fff;
    }
    .prompt-card-header {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: #f8f9fa; border-bottom: 1px solid #eee; flex-wrap: wrap;
    }
    .prompt-card-header .pc-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; background: #4361ee; color: #fff;
      border-radius: 50%; font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
    }
    .prompt-card-header .pc-title { font-weight: 600; font-size: 0.92rem; flex: 1; min-width: 0; }
    .prompt-card-header .pc-type {
      font-size: 0.72rem; background: #eef1ff; color: #4361ee;
      padding: 2px 10px; border-radius: 12px; font-weight: 600; white-space: nowrap;
    }
    .prompt-card-header .pc-ref {
      font-size: 0.72rem; background: #fef3e0; color: #e65100;
      padding: 2px 10px; border-radius: 12px; font-weight: 600; white-space: nowrap;
    }
    .prompt-card-body { padding: 12px 16px; }
    .prompt-card-body .pc-copy {
      font-size: 0.8rem; color: #666; line-height: 1.5; margin-bottom: 8px;
      max-height: 60px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .prompt-card-body textarea {
      width: 100%; min-height: 120px; padding: 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.88rem; line-height: 1.6; resize: vertical;
      font-family: inherit;
    }
    .prompt-card-body textarea:focus { outline: none; border-color: #4361ee; }
    .prompt-card-ref-preview { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .prompt-card-ref-preview img {
      width: 80px; height: 54px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd;
    }
    .prompt-card-ref-preview span { font-size: 0.78rem; color: #888; }

    @media (max-width: 600px) {
      .container { padding: 12px 8px 40px; }
      header h1 { font-size: 1.4rem; }
      .type-grid { grid-template-columns: repeat(2, 1fr); }
      .api-key-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>記事広告 作図生成ツール</h1>
      <p class="subtitle">記事原稿から理解促進用の高品質画像を自動生成します</p>
    </header>

    <div class="api-key-bar">
      <label>Gemini API Key:</label>
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
      <button class="btn-save-key" id="saveKeyBtn">保存</button>
      <span class="status" id="keyStatus"></span>
    </div>

    <!-- Step 1 -->
    <section id="step1" class="step active">
      <div class="step-header">
        <span class="step-number">1</span>
        <h2>記事原稿をアップロード</h2>
      </div>
      <div class="step-content">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📄</div>
          <p>テキストファイルをドラッグ&ドロップ<br>またはクリックして選択</p>
          <input type="file" id="fileInput" accept=".txt,.md,.text" hidden>
        </div>
        <div class="divider"><span>または</span></div>
        <textarea id="articleText" placeholder="記事原稿をここに貼り付けてください..."></textarea>
        <button id="splitBtn" class="btn primary" disabled>文脈を分析する</button>
      </div>
    </section>

    <!-- Step 2 -->
    <section id="step2" class="step">
      <div class="step-header">
        <span class="step-number">2</span>
        <h2>文脈を編集し、作図タイプを指定</h2>
      </div>
      <div class="step-content">
        <p class="hint-text">
          チェックで作図対象を選択。各セクションごとに画像の種類を指定できます。<br>
          「結合」で隣のセクションと統合、「分割」でセクションをさらに細かく分けられます。
        </p>
        <div id="sectionsList"></div>
        <button id="generateBtn" class="btn primary" disabled>選択した文脈の画像を生成</button>
      </div>
    </section>

    <!-- Step 2.5: Per-item prompt editing -->
    <section id="step2half" class="step">
      <div class="step-header">
        <span class="step-number">2.5</span>
        <h2>画像ごとのプロンプトを確認・編集</h2>
      </div>
      <div class="step-content">
        <p class="hint-text">
          各画像の生成プロンプトを個別に編集できます。<br>
          コピー（文脈テキスト）・参考画像は自動で付与されます。
        </p>
        <div id="promptCards"></div>
        <div class="actions" style="margin-top:16px;">
          <button id="backToSectionsBtn" class="btn secondary">セクション選択に戻る</button>
          <button id="executeGenerateBtn" class="btn primary">この内容で画像を生成</button>
        </div>
      </div>
    </section>

    <!-- Step 3 -->
    <section id="step3" class="step">
      <div class="step-header">
        <span class="step-number">3</span>
        <h2>生成された画像</h2>
      </div>
      <div class="step-content">
        <div id="progressBar" class="progress-bar">
          <div class="spinner-sm"></div>
          <span class="progress-text" id="progressText">生成中...</span>
        </div>
        <div id="diagramsOutput"></div>
        <div class="actions">
          <button id="backBtn" class="btn secondary">文脈選択に戻る</button>
          <button id="downloadAllBtn" class="btn primary">すべてダウンロード</button>
        </div>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loadingText">分析中...</p>
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ============================================================
  // Image type definitions for article LP
  // ============================================================
  // Genre definitions for ref image filtering (must match admin.html)
  const REF_INDUSTRIES = [
    { id: "beauty", name: "美容・コスメ" }, { id: "health", name: "健康・サプリ" },
    { id: "food", name: "食品・飲料" }, { id: "fashion", name: "ファッション" },
    { id: "lifestyle", name: "生活・雑貨" }, { id: "finance", name: "金融・保険" },
    { id: "education", name: "教育・学習" }, { id: "other", name: "その他" },
  ];
  const REF_SUBTYPES = [
    { id: "empathy", name: "共感・悩み" }, { id: "highlight", name: "強調・インパクト" },
    { id: "mechanism", name: "図解・メカニズム" }, { id: "comparison", name: "比較・対比" },
    { id: "data", name: "数値・データ" }, { id: "steps", name: "手順・フロー" },
    { id: "product", name: "商品・素材" }, { id: "scene", name: "使用シーン" },
    { id: "expert", name: "専門家・権威" }, { id: "cta", name: "CTA・訴求" },
  ];

  const IMAGE_TYPES = {
    // ===== 強調・共感 =====
    empathy_scene: { icon: "😰", name: "共感シーン", desc: "読者の悩みに寄り添うシーン", category: "強調・共感",
      prompt: "記事の内容が描写する悩みや困りごとを、1つのシーンとしてビジュアル化してください。読者が「自分のことだ」と感じるような、日常的でリアルな場面を描いてください。イラストまたは写真風どちらでもOK。" },
    highlight: { icon: "⚡", name: "キーメッセージ強調", desc: "重要な主張を視覚的にインパクト", category: "強調・共感",
      prompt: "記事の中で最も伝えたいメッセージを、視覚的にインパクトのある1枚の画像で表現してください。大きな文字と印象的なビジュアルで、読者の目を止める挿絵にしてください。" },
    emotion: { icon: "😊", name: "感情表現", desc: "喜び・驚き・安心などの感情", category: "強調・共感",
      prompt: "記事の内容に合った感情（喜び、驚き、安心、期待など）を表現する人物のイラストまたは写真を生成してください。読者が感情移入できるような表情やポーズにしてください。" },

    // ===== ビジュアライズ =====
    mechanism: { icon: "🔬", name: "メカニズム図解", desc: "仕組みや原理をわかりやすく図解", category: "ビジュアライズ",
      prompt: "記事で説明されている仕組み・メカニズム・原理を、シンプルでわかりやすい図解イラストにしてください。矢印や簡単なアイコンを使い、一目で理解できる構成にしてください。情報は必要最小限に絞ってください。" },
    comparison: { icon: "🔄", name: "比較・対比", desc: "ビフォーアフターや左右比較", category: "ビジュアライズ",
      prompt: "記事の内容にある比較や対比を、左右分割またはビフォーアフター形式でビジュアル化してください。違いが一目でわかるように、色やサイズのコントラストを活用してください。" },
    data_visual: { icon: "📊", name: "数値・データの可視化", desc: "統計や数値をビジュアルで表現", category: "ビジュアライズ",
      prompt: "記事に含まれる数値やデータを、視覚的にインパクトのある形で表現してください。グラフ、チャート、大きな数字表示など、一目で数値の意味が伝わる挿絵にしてください。" },
    step_process: { icon: "👣", name: "ステップ・手順", desc: "手順やフローをわかりやすく図解", category: "ビジュアライズ",
      prompt: "記事で説明されている手順・ステップ・フローを、シンプルな図解で表現してください。番号付きのステップ、矢印での流れ、かわいいイラストを組み合わせて、手順が一目でわかるようにしてください。" },

  // --- Gemini Text API (2.5 Flash for text tasks) ---
  async function callGeminiText(prompt, maxTokens = 16384) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。上部にGemini APIキーを入力してください。");

    for (let attempt = 0; attempt <= 3; attempt++) {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: maxTokens, thinkingConfig: { thinkingBudget: 1024 } },
          }),
        }
      );
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err.error?.message || `${response.status}`;
        if (response.status === 400 || response.status === 403) throw new Error("APIキーが無効です。");
        const isRetryable = msg.includes("429") || msg.includes("overloaded") || msg.includes("high demand") || msg.includes("503");
        if (attempt < 3 && isRetryable) {
          console.log(`[Text API] Retry ${attempt + 1}/3...`);
          await new Promise(r => setTimeout(r, 3000 * Math.pow(2, attempt) + Math.random() * 2000));
          continue;
        }
        throw new Error(msg);
      }
      const data = await response.json();
      const candidate = data.candidates?.[0];
      if (!candidate?.content?.parts) throw new Error("APIからの応答が空です。");
      const textParts = candidate.content.parts.filter(p => !p.thought && p.text);
      if (textParts.length === 0) throw new Error("テキスト応答がありません。");
      return textParts.map(p => p.text).join("\n");
    }
  }

  // --- Gemini Image Generation (1-stage: prompt + reference images → image) ---
  async function callGeminiImageDirect(parts) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("APIキーが設定されていません。上部にGemini APIキーを入力してください。");

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent`;
    const body = {
      contents: [{ parts }],
      generationConfig: {
        responseModalities: ["TEXT", "IMAGE"],
        temperature: 1.6,
      },
    };

    try {
      console.log("[Image] Generating with gemini-3.1-flash-image-preview (direct mode)");
      const response = await fetch(`${url}?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `Image API Error: ${response.status}`);
      }
      const data = await response.json();
      const candidate = data.candidates?.[0];
      if (!candidate?.content?.parts) throw new Error("画像生成の応答が空です。");

      const imgPart = candidate.content.parts.find(p => p.inlineData);
      const textPart = candidate.content.parts.find(p => p.text && !p.thought);

      if (!imgPart) {
        throw new Error(textPart?.text || "画像が生成されませんでした。");
      }

      return {
        imageBase64: imgPart.inlineData.data,
        mimeType: imgPart.inlineData.mimeType || "image/png",
        text: textPart?.text || "",
      };
    } catch (err) {
      throw err;
    }
  }

  // --- Retry wrapper with exponential backoff ---
  async function callGeminiImageWithRetry(parts, maxRetries = 5) {
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        return await callGeminiImageDirect(parts);
      } catch (err) {
        const isRetryable = err.message.includes("429")
          || err.message.includes("RESOURCE_EXHAUSTED")
          || err.message.includes("high demand")
          || err.message.includes("overloaded")
          || err.message.includes("503")
          || err.message.includes("画像が生成されませんでした");
        if (attempt < maxRetries && isRetryable) {
          const baseWait = 3000 * Math.pow(2, attempt);
          const jitter = Math.random() * 2000;
          console.log(`[Retry] Attempt ${attempt + 1}/${maxRetries}, waiting ${Math.round((baseWait + jitter) / 1000)}s...`);
          await new Promise(r => setTimeout(r, baseWait + jitter));
          continue;
        }
        throw err;
      }
    }
  }

  // Save current UI state (checked, image type, selected ref) per section
  function saveSelectionState() {
    const state = {};
    sectionsList.querySelectorAll(".section-card").forEach(card => {
      const idx = parseInt(card.dataset.sectionIndex);
      const cb = card.querySelector("input[type=checkbox]");
      const typeRadio = card.querySelector("input[type=radio]:checked");
      const selectedRef = card.querySelector(".ref-thumb.selected");
      state[idx] = {
        checked: cb?.checked || false,
        imageType: typeRadio?.value || "",
        refId: selectedRef?.dataset.refId || "",
      };
    });
    return state;
  }

  // Map old state indices to new indices after merge/split
  function mapState(oldState, changeIdx, changeType, newCount) {
    const mapped = {};
    for (const [oldIdxStr, val] of Object.entries(oldState)) {
      const oldIdx = parseInt(oldIdxStr);
      let newIdx = oldIdx;
      if (changeType === "merge") {
        if (oldIdx === changeIdx + 1) continue; // merged into changeIdx
        if (oldIdx > changeIdx + 1) newIdx = oldIdx - 1;
      } else if (changeType === "split") {
        // splitCount = how many new sections replaced the one at changeIdx
        if (oldIdx === changeIdx) continue; // will be replaced
        if (oldIdx > changeIdx) newIdx = oldIdx + (newCount - 1);
      }
      if (newIdx >= 0) mapped[newIdx] = val;
    }
    return mapped;
  }

  function restoreSelectionState(state) {
    sectionsList.querySelectorAll(".section-card").forEach(card => {
      const idx = parseInt(card.dataset.sectionIndex);
      const saved = state[idx];
      if (!saved) return;
      // Restore checked
      const cb = card.querySelector("input[type=checkbox]");
      if (cb && saved.checked) {
        cb.checked = true;
        card.classList.add("selected");
      }
      // Restore image type
      if (saved.imageType) {
        const radio = card.querySelector(`input[type=radio][value="${saved.imageType}"]`);
        if (radio) radio.checked = true;
      }
      // Restore ref image (need to trigger picker first)
      if (saved.checked) {
        const checkedRadio = card.querySelector("input[type=radio]:checked");
        if (checkedRadio) updateRefPicker(idx, checkedRadio.value);
        // After picker rendered, select the ref
        if (saved.refId) {
          setTimeout(() => {
            const thumb = card.querySelector(`.ref-thumb[data-ref-id="${saved.refId}"]`);
            if (thumb) thumb.classList.add("selected");

  function updateRefPicker(sectionIdx, subtypeKey) {
    const picker = document.getElementById(`refpicker-${sectionIdx}`);

  function updateGenerateBtn() {
    generateBtn.disabled = sectionsList.querySelectorAll("input[type=checkbox]:checked").length === 0;

  function mergeSections(idxA, idxB) {
    if (idxA < 0 || idxB >= sections.length) return;
    const oldState = saveSelectionState();
    const a = sections[idxA], b = sections[idxB];
    sections.splice(idxA, 2, { title: a.title.length >= b.title.length ? a.title : b.title, content: a.content + "\n" + b.content });
    const newState = mapState(oldState, idxA, "merge", 0);
    renderSections();
    restoreSelectionState(newState);
  }

  async function splitSection(idx) {
    const sec = sections[idx];
    const oldState = saveSelectionState();
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    if (progressBar) { progressBar.classList.add("active"); progressText.textContent = `「${sec.title}」を分割中...`; }
    try {
      const prompt = `以下のテキストを、さらに細かい意味のまとまりに分割してください。
最低2つ以上のセクションに分けてください。1文〜2文の短いセクションでもOKです。
ルール:
- 各セクションには「title」（15文字以内の要約）と「content」（原文テキスト）を含める
- JSON配列のみ返してください

テキスト:
${sec.content}`;
      const result = await callGeminiText(prompt, 8192);
      const cleaned = result.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
      const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("分割に失敗しました");
      const subSections = JSON.parse(jsonMatch[0]);
      if (subSections.length < 2) throw new Error("これ以上分割できません");
      sections.splice(idx, 1, ...subSections);
      const newState = mapState(oldState, idx, "split", subSections.length);
      renderSections();
      restoreSelectionState(newState);
    } catch (err) {
      showError(stepsEl.step2.querySelector(".step-content"), err.message);

  }

      const sec = sections[s.idx];
      const typeInfo = IMAGE_TYPES[s.imageType] || {};
      const refImg = s.refId ? getRefImages().find(r => r.id === s.refId) : null;

      const card = document.createElement("div");
      card.className = "prompt-card";
      card.dataset.pendingIndex = i;

      let refPreviewHTML = "";
      if (refImg?.dataUrl) {
        const refTypeName = IMAGE_TYPES[refImg.subtype]?.name || refImg.subtype;
        refPreviewHTML = `<div class="prompt-card-ref-preview">
          <img src="${refImg.dataUrl}" alt="ref">
          <span>参考画像: ${esc(refTypeName)}</span>
        </div>`;
      }

      card.innerHTML = `
        <div class="prompt-card-header">
          <span class="pc-num">${i + 1}</span>
          <span class="pc-title">${esc(sec.title)}</span>
          <span class="pc-type">${esc(typeInfo.name || "")}</span>
          ${refImg ? '<span class="pc-ref">参考画像あり</span>' : ""}
        </div>
        <div class="prompt-card-body">
          <div class="pc-copy">${esc(sec.content)}</div>
          ${refPreviewHTML}
          <textarea class="pc-prompt" data-index="${i}">${esc(DEFAULT_PROMPT)}</textarea>
        </div>
      `;
      promptCards.appendChild(card);
    });

    showStep("step2half");
  });

  backToSectionsBtn.addEventListener("click", () => showStep("step2"));

  // Step 2.5 → Step 3: Execute generation (direct to image model, like creative-generator)
  executeGenerateBtn.addEventListener("click", async () => {
    if (pendingSelected.length === 0) return;

    // Collect per-item prompts
    const perItemPrompts = [];
    promptCards.querySelectorAll(".pc-prompt").forEach(ta => {
      perItemPrompts[parseInt(ta.dataset.index)] = ta.value.trim();
    });

    generatedDiagrams = [];
    diagramsOutput.innerHTML = "";
    showStep("step3");

    // Non-blocking progress bar
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    progressBar.classList.add("active");

    let completed = 0;
    let errors = 0;

    for (let i = 0; i < pendingSelected.length; i++) {
      const { idx, imageType, refId } = pendingSelected[i];
      const section = sections[idx];
      const typeInfo = IMAGE_TYPES[imageType] || IMAGE_TYPES.empathy_scene;
      const userPrompt = perItemPrompts[i] || DEFAULT_PROMPT;

      try {
        progressText.textContent = `内容を整理中... (${completed + 1}/${pendingSelected.length}) ${section.title}`;
        const oneMessage = await summarizeForIllustration(section, typeInfo);
        console.log("[Summary]", oneMessage);

        progressText.textContent = `画像を生成中... (${completed + 1}/${pendingSelected.length}) ${section.title}`;
        const callParts = buildImageParts(oneMessage, typeInfo, refId, userPrompt);
        const result = await callGeminiImageWithRetry(callParts, 5);

        const byteChars = atob(result.imageBase64);
        const byteArray = new Uint8Array(byteChars.length);
        for (let j = 0; j < byteChars.length; j++) byteArray[j] = byteChars.charCodeAt(j);
        const blob = new Blob([byteArray], { type: result.mimeType });

        const diagramData = {
          title: section.title,
          typeName: typeInfo.name,
          compositeBlob: blob,
          summary: result.text || section.title,
          // Store context for regeneration
          _section: section,
          _typeInfo: typeInfo,
          _refId: refId,
          _userPrompt: userPrompt,
          _oneMessage: oneMessage,
        };
        generatedDiagrams.push(diagramData);
        appendDiagramCard(diagramData, generatedDiagrams.length - 1);
      } catch (err) {
        errors++;
        appendErrorCard(section.title, typeInfo.name, err.message);
      }
      completed++;
    }

    progressBar.classList.remove("active");
    if (errors > 0 && errors < pendingSelected.length) {
      showError(stepsEl.step3.querySelector(".step-content"), `${errors}件の画像生成に失敗しました。`);
    } else if (errors === pendingSelected.length) {
      showError(stepsEl.step3.querySelector(".step-content"), "すべての画像生成に失敗しました。");
    }
  });

  // --- 記事内容を「この挿絵が伝えるべき1メッセージ」に要約 ---
  async function summarizeForIllustration(section, typeInfo) {
    const prompt = `以下の記事セクションを読み、挿絵画像が伝えるべき「1つのメッセージ」を抽出してください。

【記事セクション】
タイトル: ${section.title}
内容: ${section.content.substring(0, 500)}

【画像タイプ】
${typeInfo.name}（${typeInfo.desc}）

【ルール】
- この挿絵が伝えるべきことを1〜2文で簡潔にまとめてください
- 読者が画像を見て直感的に理解できるメッセージにしてください
- 具体的な商品名・成分名・数値があれば含めてください
- 余計な修飾語は省き、要点だけにしてください
- テキストのみ返してください（JSON不要）`;

    try {
      const result = await callGeminiText(prompt, 512);
      return result.trim();
    } catch {
      return `${section.title}: ${section.content.substring(0, 100)}`;
    }
  }

  // --- Build image generation parts (参考画像を直接渡す + 1メッセージ要約) ---
  function buildImageParts(oneMessage, typeInfo, refId, userPrompt) {
    const parts = [];

    const prompt = `${userPrompt}

【この挿絵が伝えるべきメッセージ】
${oneMessage}

【画像タイプ】
${typeInfo.name}

【デザイン指示】
${typeInfo.prompt}

【出力ルール】
- 上記の「伝えるべきメッセージ」の内容に忠実な被写体・シーンにしてください
- 1枚=1メッセージ。情報を詰め込みすぎないでください
- 画像サイズは1280×720pxの構図で作成してください`;

    parts.push({ text: prompt });

    // 参考画像を直接渡す
    if (refId) {
      const refImg = getRefImages().find(r => r.id === refId);
      if (refImg?.dataUrl) {
        const base64 = refImg.dataUrl.replace(/^data:image\/[^;]+;base64,/, "");
        parts.push({ text: "以下は「参考画像」です。この画像のレイアウト・配色・トンマナを参考にしつつ、被写体やシーンは上記の「伝えるべきメッセージ」の内容に合わせてください：" });
        parts.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
      }
    }

    return parts;
  }

  function appendDiagramCard(d, index) {
    const card = document.createElement("div");
    card.className = "diagram-card";
    card.dataset.diagramIndex = index;
    card.innerHTML = `
      <div class="diagram-card-header">
        <h3>${esc(d.title)} <span style="font-size:0.8rem;color:#888;font-weight:400;">— ${esc(d.typeName)}</span></h3>
        <div class="diagram-actions">
          <button class="btn-sm" data-action="dl-png" data-index="${index}">PNGダウンロード</button>
        </div>
      </div>
      <div class="diagram-card-body"></div>
      <div class="diagram-summary">${esc(d.summary)}</div>
      <div class="regen-area">
        <details>
          <summary>修正指示を出して再生成</summary>
          <div class="regen-body">
            <textarea class="regen-prompt" placeholder="例: もっとシンプルに / イラスト風にして / 背景を明るく...">${esc(d._userPrompt || "")}</textarea>
            <button class="regen-btn" data-regen-index="${index}">再生成</button>
            <span class="regen-status"></span>
          </div>
        </details>
      </div>
    `;
    const img = document.createElement("img");
    img.src = URL.createObjectURL(d.compositeBlob);
    img.alt = d.title;
    img.style.maxWidth = "100%";
    img.style.borderRadius = "8px";
    card.querySelector(".diagram-card-body").appendChild(img);
    diagramsOutput.appendChild(card);
    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function appendErrorCard(title, typeName, errorMsg) {
    const card = document.createElement("div");
    card.className = "diagram-card";
    card.innerHTML = `
      <div class="diagram-card-header" style="background:#fff0f0;">
        <h3 style="color:#c33;">${esc(title)} <span style="font-size:0.8rem;color:#888;font-weight:400;">— ${esc(typeName)}</span></h3>
      </div>
      <div class="error-msg" style="margin:12px 18px;">${esc(errorMsg)}</div>
    `;
    diagramsOutput.appendChild(card);
  }

  // --- Download & Regenerate ---
  diagramsOutput.addEventListener("click", async (e) => {
    // Download
    const dlBtn = e.target.closest("[data-action='dl-png']");
    if (dlBtn) {
      const idx = parseInt(dlBtn.dataset.index);
      const d = generatedDiagrams[idx];
      if (!d) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(d.compositeBlob);
      a.download = `${d.title}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
      return;
    }

    // Regenerate
    const regenBtn = e.target.closest("[data-regen-index]");
    if (regenBtn) {
      const idx = parseInt(regenBtn.dataset.regenIndex);
      const d = generatedDiagrams[idx];
      if (!d) return;

      const card = regenBtn.closest(".diagram-card");
      const textarea = card.querySelector(".regen-prompt");
      const statusEl = card.querySelector(".regen-status");
      const newPrompt = textarea.value.trim();
      if (!newPrompt) return;

      regenBtn.disabled = true;
      statusEl.textContent = "再生成中...";

      try {
        // Re-summarize with the same section
        const oneMessage = d._oneMessage || d.title;

        const callParts = buildImageParts(oneMessage, d._typeInfo, d._refId, newPrompt);
        const result = await callGeminiImageWithRetry(callParts, 5);

        const byteChars = atob(result.imageBase64);
        const byteArray = new Uint8Array(byteChars.length);
        for (let j = 0; j < byteChars.length; j++) byteArray[j] = byteChars.charCodeAt(j);
        const blob = new Blob([byteArray], { type: result.mimeType });

        // Update the diagram data
        d.compositeBlob = blob;
        d.summary = result.text || d.title;
        d._userPrompt = newPrompt;

        // Replace image in card
        const imgEl = card.querySelector(".diagram-card-body img");
        const oldSrc = imgEl.src;
        imgEl.src = URL.createObjectURL(blob);
        URL.revokeObjectURL(oldSrc);

        // Update summary
        card.querySelector(".diagram-summary").textContent = d.summary;

        statusEl.textContent = "完了";
        setTimeout(() => { statusEl.textContent = ""; }, 3000);
      } catch (err) {
        statusEl.textContent = `エラー: ${err.message}`;
      } finally {
        regenBtn.disabled = false;
      }
    }
  });

  downloadAllBtn.addEventListener("click", () => {
    generatedDiagrams.forEach(d => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(d.compositeBlob);
      a.download = `${d.title}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  });

  // --- Navigation ---
  backBtn.addEventListener("click", () => showStep("step2"));

  // --- Helpers ---
  function showStep(id) { Object.values(stepsEl).forEach(s => s.classList.remove("active")); stepsEl[id].classList.add("active"); window.scrollTo({ top: 0, behavior: "smooth" }); }
  function showLoading(msg) { loadingText.textContent = msg; loadingEl.classList.remove("hidden"); }
  function hideLoading() { loadingEl.classList.add("hidden"); }
  function showError(container, msg) {
    const ex = container.querySelector(".error-msg"); if (ex) ex.remove();
    const el = document.createElement("div"); el.className = "error-msg"; el.textContent = msg;
    container.appendChild(el); setTimeout(() => el.remove(), 10000);
  }
  function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
});
</script>
</body>
